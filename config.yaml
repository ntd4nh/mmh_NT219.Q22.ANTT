# ============================================================
# Deep Learning for AES Cryptanalysis — Configuration
# ============================================================

# ---- Data Generation ----
data:
  toy_aes:
    num_rounds: 2          # Reduced-round AES (1-4)
    key_size: 16           # 16 bytes = AES-128
    target_byte: 0         # Which key byte to attack
    train_samples: 200000
    val_samples: 20000
    test_samples: 20000
  
  simulated_sca:
    trace_length: 700      # Number of time points per trace
    snr: 5.0               # Signal-to-noise ratio
    num_traces: 100000
    hw_model: true         # Use Hamming Weight leakage model

# ---- Model Hyperparameters ----
model:
  cnn:
    name: "SmallCNN"
    input_size: 16         # 16 bytes for ciphertext
    num_classes: 256       # 256 possible key byte values
    conv_channels: [32, 64, 128]
    kernel_sizes: [3, 3, 3]
    dropout: 0.3
    use_residual: true
  
  deep_cnn:
    name: "DeepCNN"
    input_size: 700        # For SCA traces
    num_classes: 256
    conv_channels: [32, 64, 128, 256]
    kernel_sizes: [11, 7, 5, 3]
    dropout: 0.4
    use_residual: true
  
  transformer:
    name: "CryptoTransformer"
    input_size: 16
    num_classes: 256
    embed_dim: 128
    num_heads: 4
    num_layers: 4
    dropout: 0.1
    ff_dim: 512

# ---- Training ----
training:
  batch_size: 256
  epochs: 100
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler: "cosine"      # cosine annealing
  warmup_epochs: 5
  early_stopping_patience: 15
  label_smoothing: 0.05
  
# ---- Evaluation ----
evaluation:
  top_n_success_rate: [1, 5, 10, 50]
  ge_num_experiments: 100

# ---- Paths ----
paths:
  data_dir: "./data"
  checkpoint_dir: "./artifacts/checkpoints"
  log_dir: "./artifacts/logs"
  results_dir: "./artifacts/results"
